<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Foodie. - Error {{ code }}</title>
    <link rel="icon" type="image/png" href="{{ url_for('favicon') }}" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #0a0a0f;
        color: #e8e2d9;
        font-family: "DM Sans", sans-serif;
        padding: 1.5rem;
      }

      main {
        width: min(100%, 460px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.045);
        box-shadow: 0 30px 80px rgba(0, 0, 0, 0.35);
        padding: 2rem;
        text-align: center;
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 0.55rem;
        color: #e8e2d9;
        font-family: "Playfair Display", serif;
        font-size: 1.45rem;
        font-weight: 700;
        margin-bottom: 1.5rem;
      }

      .brand img {
        width: 30px;
        height: 30px;
      }

      .code {
        color: #f4a14a;
        font-size: clamp(3rem, 18vw, 5.5rem);
        font-weight: 700;
        line-height: 1;
      }

      h1 {
        font-size: 1.25rem;
        margin: 1rem 0 0.55rem;
      }

      p {
        color: rgba(232, 226, 217, 0.66);
        line-height: 1.6;
      }

      a {
        display: inline-block;
        margin-top: 1.4rem;
        border-radius: 10px;
        background: #f4a14a;
        color: #0a0a0f;
        font-weight: 700;
        padding: 0.8rem 1rem;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="brand">
        <img src="{{ url_for('favicon') }}" alt="" />
        Foodie.
      </div>
      <div class="code">{{ code }}</div>
      <h1>{{ message }}</h1>
      <p>The request could not be completed. You can return to the app and continue safely.</p>
      <a href="{{ url_for('index') }}">Back to Foodie.</a>
    </main>
  </body>
</html>
